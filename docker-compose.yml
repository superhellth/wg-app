# WG app — full stack for the Raspberry Pi (4 GB).
# Build arm64 images on a dev machine with buildx, or build on the Pi directly.
#
# Compose reads the top-level .env automatically (POSTGRES_PASSWORD, VITE_*,
# TUNNEL_TOKEN). App secrets (WG_TOKEN_SECRET, VAPID_*) come from api/.env.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wg
    # Postgres data on a host path (SD card; no USB drive on the Pi).
    # Create /mnt/data/pgdata once: sudo mkdir -p /mnt/data/pgdata
    volumes:
      - /mnt/data/pgdata:/var/lib/postgresql/data
    # Trim logging + WAL footprint for flash endurance.
    command:
      - postgres
      - -c
      - logging_collector=off
      - -c
      - log_statement=none
      - -c
      - max_wal_size=512MB
      - -c
      - min_wal_size=80MB
      - -c
      - checkpoint_timeout=15min
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wg -d wg"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: apply Drizzle migrations, then exit. Uses the build stage (has
  # drizzle-kit). Requires committed migrations in api/drizzle (pnpm db:generate).
  migrate:
    build:
      context: .
      target: build
    command: pnpm --filter @wg/api db:migrate
    env_file: ./api/.env
    environment:
      DATABASE_URL: postgres://wg:${POSTGRES_PASSWORD}@db:5432/wg
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: ./api/.env
    environment:
      DATABASE_URL: postgres://wg:${POSTGRES_PASSWORD}@db:5432/wg
      HOST: 0.0.0.0
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Same image as api, different entrypoint: cron worker (time-based push).
  worker:
    build:
      context: .
      target: runtime
    command: node dist/worker.js
    restart: unless-stopped
    env_file: ./api/.env
    environment:
      DATABASE_URL: postgres://wg:${POSTGRES_PASSWORD}@db:5432/wg
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Nightly Postgres backup → Cloudflare R2. Dockerized in place of a host
  # rclone+systemd setup: it sleeps until BACKUP_HOUR:BACKUP_MINUTE and streams
  # pg_dump straight to R2 (rclone rcat) — no local file. The R2 remote is built
  # from the RCLONE_CONFIG_R2_* env vars — no interactive `rclone config`.
  backup:
    build:
      context: ./backup
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://wg:${POSTGRES_PASSWORD}@db:5432/wg
      BACKUP_HOUR: "3"
      BACKUP_MINUTE: "30"
      R2_BUCKET: ${R2_BUCKET}
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      RCLONE_CONFIG_R2_ENDPOINT: ${R2_ENDPOINT}
      # R2 token is bucket-scoped (no CreateBucket rights); skip rclone's implicit
      # bucket check/create so rcat doesn't 403 on an already-existing bucket.
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
    depends_on:
      db:
        condition: service_healthy

  # Physical display: 16x2 I2C LCD + 4 GPIO buttons. Reads config + content from
  # the api and drives the screen. Needs host GPIO/I2C access (privileged), so
  # enable the I2C interface on the Pi first (raspi-config / dtparam=i2c_arm=on).
  display:
    build:
      context: ./pi/display
    restart: unless-stopped
    env_file: ./api/.env # provides WG_TOKEN_SECRET
    environment:
      API_URL: http://api:3000
      LCD_ADDRESS: "0x3f"
      LCD_PORT: "1" # /dev/i2c-1 (SDA1/SCL1)
      TZ: Europe/Berlin # on/off schedule is Berlin wall-clock
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
      - /dev/gpiochip0:/dev/gpiochip0 # lgpio edge detection
      - /dev/i2c-1:/dev/i2c-1
    depends_on:
      - api

  # Static PWA + reverse proxy. VITE_* baked at build time.
  caddy:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
    restart: unless-stopped
    ports:
      - "80:80" # for local LAN access / debugging; the tunnel uses the internal net
    depends_on:
      - api

  # Outbound Cloudflare Tunnel (token mode). Point the public hostname at
  # http://caddy:80 in the Cloudflare dashboard.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - caddy
